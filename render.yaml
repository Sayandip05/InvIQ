# ── Render Infrastructure as Code ────────────────────────────────────────
# Deploy InvIQ to Render.com
# Database: Supabase (external PostgreSQL — set DATABASE_URL manually)
# Cache: Upstash Redis (external — set REDIS_URL manually)

services:
  # ── FastAPI Backend ──────────────────────────────────────────────────
  - type: web
    name: inviq-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: singapore        # closest to India
    plan: free
    healthCheckPath: /health
    envVars:
      # ── Database (Supabase) — set manually in Render dashboard ──
      - key: DATABASE_URL
        sync: false          # paste Supabase connection string in dashboard

      # ── Redis (Upstash) — set manually in Render dashboard ──
      - key: REDIS_URL
        sync: false          # paste Upstash Redis URL in dashboard

      - key: REDIS_ENABLED
        value: "true"

      # ── Auth ──
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure random value

      - key: ENVIRONMENT
        value: production

      # ── CORS — point to your Vercel frontend ──
      - key: CORS_ORIGINS
        sync: false          # set to: https://your-app.vercel.app

      - key: FRONTEND_URL
        sync: false          # set to: https://your-app.vercel.app

      # ── AI ──
      - key: GROQ_API_KEY
        sync: false          # set manually in dashboard

      # ── RAG — disabled on free tier (no persistent disk) ──
      - key: CHROMADB_ENABLED
        value: "false"

      # ── Admin seed credentials ──
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false          # set a strong password in dashboard
      - key: ADMIN_FULL_NAME
        value: "System Administrator"

      # ── Super Admin ──
      - key: SUPER_ADMIN_EMAIL
        sync: false          # your personal email

      # ── Email (optional — disable if not needed) ──
      - key: SMTP_ENABLED
        value: "false"
