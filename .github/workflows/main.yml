name: CI — Test & Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_inventory
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test_user -d test_inventory"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/test_inventory
      ENVIRONMENT: testing
      SECRET_KEY: test-secret-key-for-ci

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run linting
        run: |
          pip install flake8
          flake8 backend/ --max-line-length=120 --exclude=__pycache__,migrations --count --show-source --statistics || true

      - name: Run tests
        working-directory: backend
        run: pytest -v --tb=short
