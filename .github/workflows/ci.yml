name: InvIQ CI (Continuous Integration)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Run Tests ────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    env:
      # ── Database ──────────────────────────────────────────────────────
      DATABASE_URL: sqlite:///./test.db

      # ── Redis / Cache (disabled in CI) ────────────────────────────────
      UPSTASH_REDIS_REST_URL: ""
      UPSTASH_REDIS_REST_TOKEN: ""
      REDIS_ENABLED: "false"

      # ── Qdrant (disabled in CI) ───────────────────────────────────────
      QDRANT_ENABLED: "false"
      QDRANT_URL: ""
      QDRANT_API_KEY: ""

      # ── Security ──────────────────────────────────────────────────────
      SECRET_KEY: ci-test-secret-key-not-for-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"

      # ── App ───────────────────────────────────────────────────────────
      ENVIRONMENT: testing
      PROJECT_NAME: "InvIQ CI"
      FRONTEND_URL: "http://localhost:5173"
      CORS_ORIGINS: "http://localhost:5173"

      # ── LLM (disabled in CI — agent falls back to rule-based) ─────────
      GROQ_API_KEY: ""
      LLM_MODEL: "llama-3.3-70b-versatile"
      LLM_TEMPERATURE: "0.1"
      LLM_MAX_TOKENS: "1024"

      # ── LangSmith (disabled in CI) ────────────────────────────────────
      LANGCHAIN_TRACING_V2: "false"
      LANGCHAIN_API_KEY: ""
      LANGCHAIN_PROJECT: "InvIQ-CI"
      LANGCHAIN_ENDPOINT: "https://api.smith.langchain.com"

      # ── Admin ─────────────────────────────────────────────────────────
      ADMIN_EMAIL: admin@test.com
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: testpassword123
      ADMIN_FULL_NAME: Test Admin
      SUPER_ADMIN_EMAIL: superadmin@test.com

      # ── Rate Limiting ─────────────────────────────────────────────────
      RATE_LIMIT_DEFAULT: "600/minute"
      RATE_LIMIT_AUTH: "60/minute"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # Cache the virtual environment to speed up subsequent runs
      - name: Cache Virtual Environment
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-py313-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-venv-py313-

      # Only install dependencies if the cache was not restored
      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        run: |
          source ../.venv/bin/activate
          python -m pytest tests/ \
            --tb=short \
            --quiet \
            --no-header \
            --timeout=120 \
            --ignore=tests/test_qdrant.py \
            --ignore=tests/test_chat.py \
            -x

  # ── Job 2: Build Docker Image ───────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test  # Only build Docker if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (verify it compiles)
        run: |
          docker build -t inviq-backend:${{ github.sha }} .
          echo "Docker build successful"
