# ── Docker Compose: Local Development Stack ──────────────────────────────
# Orchestrates Nginx, FastAPI app, PostgreSQL, and Redis for local dev.
#
# Usage:
#   docker compose up -d          → start all services
#   docker compose logs -f app    → tail the app logs
#   docker compose logs -f nginx  → tail nginx logs
#   docker compose down -v        → stop + remove volumes
#
# Architecture:
#   Client → Nginx (80) → FastAPI (8000) → PostgreSQL (5432) + Redis (6379)

services:
  # ── Nginx Reverse Proxy ────────────────────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - inviq_network

  # ── PostgreSQL Database ────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: inventory_pass
      POSTGRES_DB: smart_inventory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory_user -d smart_inventory"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - inviq_network


  # ── Redis Cache ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - inviq_network


  # ── FastAPI Application ────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8000"  # Internal only, accessed via Nginx
    environment:
      # Database — connects to the 'db' service above
      DATABASE_URL: postgresql://inventory_user:inventory_pass@db:5432/smart_inventory
      ENVIRONMENT: production

      # Redis — connects to the 'redis' service above
      REDIS_URL: redis://redis:6379/0

      # Security — CHANGE THESE for production!
      SECRET_KEY: ${SECRET_KEY:-change-me-generate-with-openssl-rand-hex-32}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@inventory.local}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}

      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}

      # AI Keys (optional — provide via .env or host env)
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    networks:
      - inviq_network

# ── Networks ───────────────────────────────────────────────────────────────
networks:
  inviq_network:
    driver: bridge

# ── Volumes ────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  nginx_logs:

