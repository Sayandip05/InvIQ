name: InvIQ CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Run Tests ────────────────────────────────────────────────────
  test:
    name: Run Backend Tests
    runs-on: ubuntu-latest

    env:
      # Use SQLite for tests — no external DB needed in CI
      DATABASE_URL: sqlite:///./test.db
      REDIS_URL: ""
      REDIS_ENABLED: "false"
      CHROMADB_ENABLED: "false"
      SECRET_KEY: ci-test-secret-key-not-for-production
      ENVIRONMENT: testing
      GROQ_API_KEY: ""
      ADMIN_EMAIL: admin@test.com
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: testpassword123
      ADMIN_FULL_NAME: Test Admin
      SUPER_ADMIN_EMAIL: superadmin@test.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r backend/requirements-dev.txt || true

      - name: Run tests
        working-directory: backend
        run: |
          python -m pytest tests/ \
            --tb=short \
            --quiet \
            --no-header \
            -x

  # ── Job 2: Build Docker Image ───────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test  # Only build if tests pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (verify it compiles)
        run: |
          docker build -t inviq-backend:${{ github.sha }} .
          echo "Docker build successful"

  # ── Job 3: Deploy to Render ─────────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [test, build]  # Only deploy if tests pass AND build succeeds
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render Deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            --fail \
            --silent \
            --show-error
          echo "Render deployment triggered successfully"
